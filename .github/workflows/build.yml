name: Build APK (Simple Flet)

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.12.2

    - name: Install Flet
      run: |
        pip install --upgrade pip
        pip install flet

    - name: Build APK
      run: |
        flet build apk --verbose --no-input

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: apk
        path: build/app/outputs/flutter-apk/
